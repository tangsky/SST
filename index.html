<script>
(() => {
  const source = window.SST_REVENUE_DATA || { records: [], budgets: {}, normalOrderType: '' };
  const records = source.records || [];
  const budgets = source.budgets || {};
  const normalOrderType = source.normalOrderType || '';
  const pad = value => String(value).padStart(2, '0');
  const keyOf = (year, month) => year * 100 + month;
  const monthEnd = (year, month) => pad(new Date(year, month, 0).getDate());
  const monthLabel = key => `${Math.floor(key / 100)}年${key % 100}月`;
  const maxDataDate = records.reduce((max, row) => !max || row.d > max ? row.d : max, '');
  const maxDateParts = (maxDataDate || new Date().toISOString().slice(0, 10)).split('-').map(Number);
  const currentLimit = { year: maxDateParts[0], month: maxDateParts[1] };
  const demoDefault = records.some(row => row.m === 202606) ? { year: 2026, month: 6 } : { year: maxDateParts[0], month: maxDateParts[1] };
  const monthState = { ...demoDefault };
  const selectedYear = document.getElementById('selectedYear');
  const selectedTime = document.getElementById('selectedTime');
  const yearPicker = document.getElementById('yearPicker');
  const yearGrid = document.getElementById('yearGrid');
  const excludeToggle = document.getElementById('excludeToggle');
  const isFutureMonth = (year, month) => year > currentLimit.year || (year === currentLimit.year && month > currentLimit.month);
  const prevMonthKey = key => {
    const year = Math.floor(key / 100);
    const month = key % 100;
    return month === 1 ? (year - 1) * 100 + 12 : year * 100 + month - 1;
  };
  const shouldExcludeGroup = () => excludeToggle.classList.contains('on');
  const rowsFor = (key, excludeGroup = shouldExcludeGroup(), dayLimit = null) => records.filter(row => {
    const inMonth = row.m === key;
    const inOrderScope = !excludeGroup || row.type === normalOrderType;
    const inDayScope = dayLimit == null || Number(row.d.slice(8, 10)) <= dayLimit;
    return inMonth && inOrderScope && inDayScope;
  });
  const sum = (rows, field) => rows.reduce((total, row) => total + Number(row[field] || 0), 0);
  const summary = (key, dayLimit = null) => {
    const rows = rowsFor(key, shouldExcludeGroup(), dayLimit);
    const revenue = sum(rows, 'revenue');
    const orders = sum(rows, 'orders');
    const budget = Number(budgets[String(key)] || 0);
    return { rows, revenue, orders, ticket: orders ? revenue / orders : 0, budget, completion: budget ? revenue / budget * 100 : 0 };
  };
  const compareDayLimit = key => {
    const rows = rowsFor(key);
    if (!rows.length) return null;
    const year = Math.floor(key / 100);
    const month = key % 100;
    const lastDataDay = Math.max(...rows.map(row => Number(row.d.slice(8, 10))));
    const daysInMonth = new Date(year, month, 0).getDate();
    return lastDataDay < daysInMonth ? lastDataDay : null;
  };
  const annualCutoff = year => year === currentLimit.year ? maxDataDate : `${year}-12-31`;
  const annualRows = (year, cutoff = annualCutoff(year), excludeGroup = shouldExcludeGroup()) => records.filter(row => Math.floor(row.m / 100) === year && row.d <= cutoff && (!excludeGroup || row.type === normalOrderType));
  const annualBudget = year => Object.entries(budgets).reduce((total, [key, value]) => Math.floor(Number(key) / 100) === year ? total + Number(value || 0) : total, 0);
  const annualSummary = (year, cutoff = annualCutoff(year)) => { const rows=annualRows(year,cutoff),revenue=sum(rows,'revenue'),orders=sum(rows,'orders'),budget=annualBudget(year);return {rows,revenue,orders,ticket:orders?revenue/orders:0,budget,completion:budget?revenue/budget*100:0}; };
  const annualDataInfo = year => {
    const cutoff = annualCutoff(year);
    const allRows = annualRows(year, cutoff, false);
    const scopedRows = annualRows(year, cutoff);
    const normalRows = annualRows(year, cutoff, true);
    const cutoffDay = dayOfYear(cutoff);
    const effectiveDays = new Set(scopedRows.filter(row => Number(row.revenue || 0) || Number(row.orders || 0)).map(row => row.d)).size;
    const daysWithRows = new Set(scopedRows.map(row => row.d));
    const start = Date.UTC(year, 0, 1);
    let missingDays = 0;
    for (let index = 0; index < cutoffDay; index += 1) {
      const day = new Date(start + index * 86400000).toISOString().slice(0, 10);
      if (!daysWithRows.has(day)) missingDays += 1;
    }
    const totalRevenue = sum(allRows, 'revenue');
    const normalRevenue = sum(normalRows, 'revenue');
    return { cutoff, cutoffDay, effectiveDays, missingDays, isHistorical: year < currentLimit.year, totalRevenue, excludedRevenue: Math.max(0, totalRevenue - normalRevenue) };
  };
  const samePeriodCutoff = year => `${year}-${annualCutoff(monthState.year).slice(5)}`;
  const dayOfYear = value => { const [y,m,d]=value.split('-').map(Number);return Math.floor((Date.UTC(y,m-1,d)-Date.UTC(y,0,1))/86400000)+1; };
  const daysInYear = year => new Date(year,1,29).getMonth()===1?366:365;
  const monthlyMapForYear = (year, cutoff = annualCutoff(year)) => { const map=new Map();annualRows(year,cutoff).forEach(row=>{const m=row.m%100,x=map.get(m)||{revenue:0,orders:0};x.revenue+=Number(row.revenue||0);x.orders+=Number(row.orders||0);map.set(m,x);});return map; };
  const formatInt = value => Math.round(value).toLocaleString('en-US');
  const formatMoney = value => `¥ ${formatInt(value)}`;
  const formatWan = value => `${(value / 10000).toFixed(1)}万`;
  const formatPct = value => `${Math.round(value)}%`;
  const formatSignedPct = value => `${value >= 0 ? '+' : ''}${value.toFixed(1)}%`;
  const dayText = day => `${pad(monthState.month)}-${pad(day)}`;
  const latestDataDay = key => {
    const rows = rowsFor(key);
    return rows.length ? Math.max(...rows.map(row => Number(row.d.slice(8, 10)))) : 0;
  };
  const formatAxis = value => value >= 10000 ? `${Number((value / 10000).toFixed(value % 10000 ? 1 : 0))}万` : formatInt(value);
  const formatTrendAxis = value => value === 0 ? '0' : `${Number((value / 10000).toFixed(1))}万`;
  const trendMax = value => Math.max(12000, Math.ceil(value / 3000) * 3000);
  const niceMax = value => {
    if (value <= 12000) return 12000;
    if (value <= 20000) return 20000;
    if (value <= 30000) return 30000;
    if (value <= 60000) return 60000;
    if (value <= 100000) return 100000;
    return Math.ceil(value / 100000) * 100000;
  };
  const setGrowth = (selector, current, previous) => {
    const el = document.querySelector(selector);
    if (!previous) { el.textContent = '--'; el.classList.remove('down'); return; }
    const pct = (current - previous) / previous * 100;
    el.textContent = `${pct >= 0 ? '+' : ''}${pct.toFixed(1)}% ${pct >= 0 ? '↑' : '↓'}`;
    el.classList.toggle('down', pct < 0);
  };
  const dailyMap = (key, dayLimit = null) => {
    const map = new Map();
    rowsFor(key, shouldExcludeGroup(), dayLimit).forEach(row => {
      const day = Number(row.d.slice(8, 10));
      const current = map.get(day) || { revenue: 0, orders: 0 };
      current.revenue += Number(row.revenue || 0);
      current.orders += Number(row.orders || 0);
      map.set(day, current);
    });
    return map;
  };
  const renderMetrics = () => {
    const cur=annualSummary(monthState.year),prev=annualSummary(monthState.year-1,samePeriodCutoff(monthState.year-1)),hasData=cur.rows.length>0;
    document.querySelector('.metric.revenue .value').textContent=hasData?`${(cur.revenue/10000).toFixed(1)}万`:'--';document.querySelector('.metric.order .value').textContent=hasData?formatInt(cur.orders):'--';document.querySelector('.metric.ticket .value').textContent=hasData?`¥${cur.ticket.toFixed(1)}`:'--';
    if(!hasData){document.querySelectorAll('.metric .up').forEach(el=>{el.textContent='--';el.classList.remove('down');});return;}setGrowth('.metric.revenue .up',cur.revenue,prev.revenue);setGrowth('.metric.order .up',cur.orders,prev.orders);setGrowth('.metric.ticket .up',cur.ticket,prev.ticket);
  };
  const renderManagementSummary = () => {
    const cur = annualSummary(monthState.year);
    const box = document.getElementById('opsSummary');
    if (!box) return;
    if (!cur.rows.length) {
      box.innerHTML = ['预算完成率', '预计全年', '剩余日均目标'].map(label => `<div class="ops-item"><span>${label}</span><b>--</b><em>暂无数据</em></div>`).join('');
      return;
    }
    const cutoff = annualCutoff(monthState.year);
    const elapsed = Math.max(dayOfYear(cutoff), 1);
    const total = daysInYear(monthState.year);
    const remaining = Math.max(total - elapsed, 0);
    const isHistorical = monthState.year < currentLimit.year;
    const timeProgress = total ? elapsed / total * 100 : 0;
    const progressDiff = cur.budget ? cur.completion - timeProgress : null;
    const progressText = progressDiff === null ? '进度--｜--' : `进度${formatPct(timeProgress)}｜<i class="ops-growth ${progressDiff < 0 ? 'down' : ''}">${progressDiff >= 0 ? '领先' : '落后'}${Math.abs(progressDiff).toFixed(0)}点</i>`;
    const budgetGap = cur.budget ? cur.revenue - cur.budget : null;
    if (isHistorical) {
      box.innerHTML = [
        `<div class="ops-item budget-kpi ${cur.completion >= 100 ? 'good' : 'warn'}"><span>最终预算完成率</span><b>${cur.budget ? formatPct(cur.completion) : '--'}</b><em>${cur.budget ? '完整年份' : '无预算'}</em></div>`,
        `<div class="ops-item ${budgetGap === null ? '' : budgetGap >= 0 ? 'good' : 'warn'}"><span>预算差额</span><b>${budgetGap === null ? '--' : `${budgetGap >= 0 ? '+' : '-'}${formatWan(Math.abs(budgetGap))}`}</b><em>${budgetGap === null ? '无预算' : budgetGap >= 0 ? '超出预算' : '低于预算'}</em></div>`,
        `<div class="ops-item"><span>年度预算</span><b>${cur.budget ? formatWan(cur.budget) : '--'}</b><em>${cur.budget ? '预算基准' : '无预算'}</em></div>`
      ].join('');
      return;
    }
    const dailyAvg = cur.revenue / elapsed;
    const forecast = dailyAvg * total;
    const forecastPct = cur.budget ? forecast / cur.budget * 100 : null;
    const budgetGapToTarget = cur.budget ? cur.budget - cur.revenue : null;
    const overBudget = cur.budget ? cur.revenue - cur.budget : 0;
    let requiredText = '--';
    let requiredSub = '无预算';
    let requiredClass = '';
    if (cur.budget) {
      if (budgetGapToTarget <= 0) { requiredText = '已达成'; requiredSub = `超预算${formatWan(overBudget)}`; requiredClass = 'good'; }
      else if (!remaining) { requiredText = '未达成'; requiredSub = `缺口${formatWan(budgetGapToTarget)}`; requiredClass = 'warn'; }
      else {
        const requiredDaily = budgetGapToTarget / remaining;
        const lift = dailyAvg ? requiredDaily / dailyAvg - 1 : null;
        requiredText = `${formatWan(requiredDaily)}/天`;
        requiredSub = lift === null ? '当前日均为0' : `较当前日均需提升${Math.round(lift * 100)}%`;
        requiredClass = lift !== null && lift > .2 ? 'warn' : 'good';
      }
    }
    box.innerHTML = [
      `<div class="ops-item budget-kpi ${progressDiff !== null && progressDiff < 0 ? 'warn' : 'good'}"><span>预算完成率</span><b>${cur.budget ? formatPct(cur.completion) : '--'}</b><em>${progressText}</em></div>`,
      `<div class="ops-item ${forecastPct !== null && forecastPct >= 100 ? 'good' : 'warn'}"><span>预计全年</span><b>${formatWan(forecast)}</b><em>预计完成率${forecastPct === null ? '--' : formatPct(forecastPct)}</em></div>`,
      `<div class="ops-item ${requiredClass}"><span>剩余日均目标</span><b>${requiredText}</b><em>${requiredSub}</em></div>`
    ].join('');
  };
  const renderSelectedTime = () => {
    const rows = annualRows(monthState.year);
    const scope = document.getElementById('dataScope');
    const groupImpact = document.getElementById('groupImpact');
    if (rows.length) {
      const dates = rows.map(row => row.d).sort();
      const info = annualDataInfo(monthState.year);
      const [cutoffMonth, cutoffDate] = info.cutoff.slice(5).split('-').map(Number);
      selectedTime.textContent = `已选时间： ${dates[0]} 至 ${dates[dates.length - 1]}`;
      if (scope) scope.textContent = `数据截至${cutoffMonth}月${cutoffDate}日${info.isHistorical ? '' : '｜不含当日'}｜营业${info.effectiveDays}天${info.missingDays ? `｜${info.missingDays}天无销售记录` : '｜无销售0天'}`;
      if (groupImpact) {
        if (info.excludedRevenue > 0 && info.totalRevenue > 0) {
          groupImpact.hidden = false;
          groupImpact.textContent = shouldExcludeGroup() ? `已剔除团订${formatWan(info.excludedRevenue)}，占原营收${(info.excludedRevenue / info.totalRevenue * 100).toFixed(1)}%` : `团订营收${formatWan(info.excludedRevenue)}，占总营收${(info.excludedRevenue / info.totalRevenue * 100).toFixed(1)}%`;
        } else {
          groupImpact.hidden = true;
          groupImpact.textContent = '';
        }
      }
    } else {
      selectedTime.textContent = '暂无数据';
      if (scope) scope.textContent = '';
      if (groupImpact) { groupImpact.hidden = true; groupImpact.textContent = ''; }
    }
  };
  const hideChartTip = () => {
    const activeTip = document.querySelector('.chart-tip.show');
    if (activeTip) activeTip.classList.remove('show');
  };
  const renderChart = () => {
    hideChartTip();
    const year = monthState.year;
    const monthly = monthlyMapForYear(year);
    const chart = document.querySelector('.chart');
    document.getElementById('currentLegend').textContent = '累计营收';
    document.getElementById('prevLegend').textContent = '累计预算';
    if (!monthly.size) {
      chart.innerHTML = '<div class="chart-empty">暂无累计营收数据</div>';
      return;
    }
    let cumulativeRevenue = 0;
    let cumulativeBudget = 0;
    const revenueSeries = new Map();
    const budgetSeries = new Map();
    for (let month = 1; month <= 12; month += 1) {
      cumulativeRevenue += monthly.get(month)?.revenue || 0;
      cumulativeBudget += Number(budgets[String(keyOf(year, month))] || 0);
      if (monthly.has(month)) revenueSeries.set(month, cumulativeRevenue / 10000);
      if (cumulativeBudget) budgetSeries.set(month, cumulativeBudget / 10000);
    }
    const cumulativeAxisStep = 100;
    const maxValue = Math.max(cumulativeAxisStep, Math.ceil(Math.max(...revenueSeries.values(), ...budgetSeries.values()) / cumulativeAxisStep) * cumulativeAxisStep);
    const plot = { left: 42, right: 344, top: 14, bottom: 88 };
    const xFor = month => plot.left + (month - 1) * ((plot.right - plot.left) / 11);
    const yFor = value => plot.bottom - Math.min(value, maxValue) / maxValue * (plot.bottom - plot.top);
    const pathFor = series => [...series.entries()].map(([month, value], index) => `${index ? 'L' : 'M'}${xFor(month).toFixed(1)} ${yFor(value).toFixed(1)}`).join(' ');
    const yTicks = Array.from({ length: Math.floor(maxValue / cumulativeAxisStep) + 1 }, (_, index) => maxValue - index * cumulativeAxisStep);
    const ySvg = yTicks.map(value => {
      const y = yFor(value).toFixed(1);
      return `<line class="${value === 0 ? 'axis-line' : 'grid'}" x1="${plot.left}" y1="${y}" x2="350" y2="${y}"></line><text x="7" y="${(Number(y) + 3).toFixed(1)}">${Number(value.toFixed(1))}</text>`;
    }).join('');
    const xSvg = Array.from({ length: 12 }, (_, index) => index + 1).map(month => `<text x="${xFor(month).toFixed(1)}" y="119" text-anchor="middle">${month}</text>`).join('');
    const marks = [...revenueSeries.entries()].map(([month, revenueWan]) => {
      const budgetWan = budgetSeries.get(month) || 0;
      const completion = budgetWan ? revenueWan / budgetWan * 100 : 0;
      const x = xFor(month).toFixed(1);
      const y = yFor(revenueWan).toFixed(1);
      const labelY = Math.max(9, Number(y) - 7).toFixed(1);
      const tip = `<b>${year}年1-${month}月</b><br>累计营收 ${revenueWan.toFixed(1)}万<br>累计预算 ${budgetWan.toFixed(1)}万<br>累计预算达成率 ${completion.toFixed(1)}%`;
      return `<text class="point-label" x="${x}" y="${labelY}" text-anchor="middle">${completion.toFixed(0)}%</text><circle class="dot" cx="${x}" cy="${y}" r="2.7"></circle><circle class="chart-hit" cx="${x}" cy="${y}" r="9" tabindex="0" role="button" aria-label="${year}年1至${month}月 累计预算达成率 ${completion.toFixed(1)}%" data-tip="${escapeHtml(tip)}"></circle>`;
    }).join('');
    chart.innerHTML = `<svg viewBox="0 0 360 126" role="img" aria-label="累计预算达成趋势折线图">${ySvg}<path class="prev" d="${pathFor(budgetSeries)}"></path><path class="cur" d="${pathFor(revenueSeries)}"></path>${marks}${xSvg}</svg><div class="chart-tip" id="chartTip" role="status"></div>`;
    const tip = document.getElementById('chartTip');
    document.querySelectorAll('.chart-hit').forEach(hit => hit.onclick = event => {
      event.stopPropagation();
      tip.innerHTML = hit.dataset.tip;
      tip.style.left = '50%';
      tip.style.top = '8px';
      tip.classList.add('show');
    });
    chart.onclick = event => { if (!event.target.closest('.chart-hit')) hideChartTip(); };
    chart.onmouseleave = hideChartTip;
  };  const renderWeek = () => {
    const map = monthlyMapForYear(monthState.year);
    const axis = document.querySelector('.week-chart .axis');
    const bars = document.querySelector('.week-chart .bars');
    if (!map.size) {
      axis.innerHTML = '<span>--</span><span>--</span><span>--</span><span>0</span>';
      bars.innerHTML = '<div class="chart-empty" style="grid-column:1 / -1">暂无数据</div>';
      return;
    }
    const values = Array.from({ length: 12 }, (_, index) => (map.get(index + 1)?.revenue || 0) / 10000);
    const monthlyAxisStep = 5;
    const maxValue = Math.max(monthlyAxisStep, Math.ceil(Math.max(...values) / monthlyAxisStep) * monthlyAxisStep);
    axis.innerHTML = Array.from({ length: Math.floor(maxValue / monthlyAxisStep) + 1 }, (_, index) => `<span>${maxValue - index * monthlyAxisStep}</span>`).join('');
    bars.innerHTML = values.map((value, index) => {
      const height = value ? Math.max(8, Math.round(value / maxValue * 67)) : 0;
      return `<div class="vbar ${value ? '' : 'empty'}" style="--h:${height}px" data-v="${value ? `${value.toFixed(1)}` : ''}" data-d="${index + 1}月"></div>`;
    }).join('');
  };  const renderOwnership = () => {
    const rows = annualRows(monthState.year);
    const ownership = document.querySelector('.ownership');
    if (!rows.length) {
      ownership.innerHTML = '<div class="data-empty">暂无业务归属数据</div>';
      return;
    }
    const totalRevenue = sum(rows, 'revenue');
    const buildStats = biz => {
      const groupRows = rows.filter(row => row.biz === biz);
      const revenue = sum(groupRows, 'revenue');
      const orders = sum(groupRows, 'orders');
      return { biz, revenue, orders, ticket: orders ? revenue / orders : 0, pct: totalRevenue ? revenue / totalRevenue * 100 : 0 };
    };
    const dine = buildStats('\u5802\u98df');
    const take = buildStats('\u5916\u9001');
    const dinePct = Math.max(0, Math.min(100, dine.pct));
    const icon = type => type === 'dine'
      ? '<img src="assets/business-dine-icon.png?v=20260710" alt="">'
      : '<img src="assets/business-delivery-icon.png?v=20260710" alt="">';
    const hero = (item, cls, colorVar, softVar, type) => `<div class="own-hero ${cls}" style="--c:var(${colorVar});--soft:${softVar}"><span class="own-icon">${icon(type)}</span><div><span class="own-label">${item.biz}</span><strong class="own-pct">${item.pct.toFixed(1)}%</strong></div></div>`;
    const income = item => `<div><span>${item.biz}收入</span><b>${formatMoney(item.revenue)}</b></div>`;
    const statCard = (item, cls, colorVar) => `<div class="own-stat-card ${cls}" style="--c:var(${colorVar})"><div class="own-stat-title"><i></i><span>${item.biz}</span></div><div class="own-stat-grid"><div><span class="own-stat-label">订单</span><b class="own-stat-value">${formatInt(item.orders)}<small class="own-unit">单</small></b></div><span class="own-sep"></span><div><span class="own-stat-label">客单价</span><b class="own-stat-value">¥ ${item.ticket.toFixed(1)}</b></div></div></div>`;
    ownership.innerHTML = `<div class="own-top">${hero(dine, 'dine', '--yellow2', '#fff4cd', 'dine')}${hero(take, 'take', '--blue', '#eaf3ff', 'take')}</div><div class="own-stack" style="--dine:${dinePct.toFixed(1)}%"><span></span><span></span></div><div class="own-income">${income(dine)}${income(take)}</div><div class="own-divider"></div><div class="own-detail-cards">${statCard(dine, 'dine', '--yellow2')}${statCard(take, 'take', '--blue')}</div>`;
  };
  const renderChannelDetail = () => {
    const rows = annualRows(monthState.year);
    const totalRevenue = sum(rows, 'revenue');
    const map = new Map();
    rows.forEach(row => {
      const key = `${row.biz}||${row.channel}`;
      if (!map.has(key)) map.set(key, { biz: row.biz, channel: row.channel, revenue: 0, orders: 0 });
      const item = map.get(key);
      item.revenue += Number(row.revenue || 0);
      item.orders += Number(row.orders || 0);
    });
    const items = [...map.values()].sort((a, b) => b.revenue - a.revenue);
    const maxRevenue = Math.max(1, ...items.map(item => item.revenue));
    const rowHtml = items.map(item => {
      const isDine = item.biz === '\u5802\u98df';
      const colorVar = isDine ? '--yellow2' : '--blue';
      const tagBg = isDine ? '#fff4c6' : '#edf4ff';
      const tagColor = isDine ? '#9a7200' : '#2f75d6';
      const showBizTag = item.channel === '\u5c0f\u7a0b\u5e8f';
      const ticket = item.orders ? item.revenue / item.orders : 0;
      const share = totalRevenue ? item.revenue / totalRevenue * 100 : 0;
      const barWidth = Math.max(3, item.revenue / maxRevenue * 100);
      return `<div class="ch-row" style="--c:var(${colorVar});--tag-bg:${tagBg};--tag-c:${tagColor}"><span class="ch-name"><i></i><b>${escapeHtml(channelLabel(item.channel))}</b>${showBizTag ? `<em>${escapeHtml(item.biz)}</em>` : ''}</span><span class="ch-num"><b>${formatMoney(item.revenue)}</b><em class="ch-share"><i style="--w:${barWidth.toFixed(0)}%"></i><small>${share.toFixed(1)}%</small></em></span><span class="ch-order">${formatInt(item.orders)}\u5355</span><span class="ch-ticket">\u00a5 ${ticket.toFixed(1)}</span></div>`;
    }).join('');
    document.querySelector('.ch-body').innerHTML = rowHtml || '<div class="detail-empty">\u6682\u65e0\u6e20\u9053\u6570\u636e</div>';
  };
  const channelLabel = name => name === '\u95e8\u5e97\u5802\u98df' ? '\u5802\u98dfPOS' : name;
  const productRowsFor = key => (source.products || []).filter(row => row.m === key && (!shouldExcludeGroup() || row.type === normalOrderType));
  const productDetailPage = document.getElementById('productDetailPage');
  const productDetailBack = document.getElementById('productDetailBack');
  const productDetailTitle = document.getElementById('productDetailTitle');
  const productDetailSub = document.getElementById('productDetailSub');
  const productDetailContent = document.getElementById('productDetailContent');
  const escapeHtml = value => String(value ?? '').replace(/[&<>"']/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
  let selectedProductCategory = '';
  const currentProductRows = () => (source.products || []).filter(row => Math.floor(row.m / 100) === monthState.year && row.d <= annualCutoff(monthState.year) && (!shouldExcludeGroup() || row.type === normalOrderType));
  const productScopeText = () => `${monthState.year}年1月1日至${annualCutoff(monthState.year)} · ${shouldExcludeGroup() ? '已剔除团订' : '含团订'} · ${selectedProductCategory || '全部分类'}`;
  const closeProductDetail = () => { productDetailPage.hidden = true; };
  const openProductDetail = (title, html) => {
    productDetailTitle.textContent = title;
    productDetailSub.textContent = productScopeText();
    productDetailContent.innerHTML = html;
    productDetailPage.hidden = false;
  };
  const excludedProductTerms = ['\u670d\u52a1\u8d39', '\u73a9\u5177'];
  const filteredProductRows = rows => rows.filter(row => !excludedProductTerms.some(term => `${row.category}${row.name}`.includes(term)));
  const productSalesRows = rows => {
    const byProduct = new Map();
    filteredProductRows(rows).forEach(row => {
      const key = `${row.code}|${row.name}`;
      const current = byProduct.get(key) || { name: row.name, category: row.category, qty: 0, income: 0 };
      current.qty += Number(row.qty || 0);
      current.income += Number(row.income || 0);
      byProduct.set(key, current);
    });
    return [...byProduct.values()].sort((a, b) => b.qty - a.qty);
  };
  const showAllProductSales = products => {
    const html = products.map((item, index) => `<div class="detail-row"><span class="detail-name">${index + 1}. ${escapeHtml(item.name)}</span><b>${formatInt(item.qty)}\u4efd</b><b>${formatMoney(item.income)}</b></div>`).join('') || '<div class="detail-empty">\u6682\u65e0\u4ea7\u54c1\u9500\u552e\u6570\u636e</div>';
    openProductDetail('\u5168\u90e8\u4ea7\u54c1\u9500\u552e', html);
  };
  const bindTop10Info = () => {
    const top10Info = document.getElementById('top10Info');
    const top10Note = document.getElementById('top10Note');
    if (!top10Info || !top10Note) return;
    const toggleTop10Note = () => {
      const visible = top10Note.hidden;
      top10Note.hidden = !visible;
      top10Info.setAttribute('aria-expanded', String(visible));
    };
    top10Info.addEventListener('click', toggleTop10Note);
    top10Info.addEventListener('keydown', event => {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        toggleTop10Note();
      }
    });
  };
  const renderProducts = () => {
    const topCard = document.querySelector('.product-top-card');
    const productRows = currentProductRows();
    const availableCategories = [...new Set(filteredProductRows(productRows).map(row => row.category).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'zh-CN'));
    if (selectedProductCategory && !availableCategories.includes(selectedProductCategory)) selectedProductCategory = '';
    const scopedRows = selectedProductCategory ? productRows.filter(row => row.category === selectedProductCategory) : productRows;
    const allProducts = productSalesRows(scopedRows);
    const topProducts = allProducts.slice(0, 10);
    const maxProductQty = Math.max(1, ...topProducts.map(item => item.qty));
    const rankHtml = topProducts.map((item, index) => `<div class="rank"><span class="num ${index < 3 ? 'hot' : ''}">${index + 1}</span><div class="rank-main"><span class="rank-name" title="${escapeHtml(item.name)}">${escapeHtml(item.name)}</span><span class="rank-bar"><i style="--w:${Math.max(6, item.qty / maxProductQty * 100).toFixed(0)}%"></i></span></div><span class="cnt">${formatInt(item.qty)}份</span></div>`).join('');
    const categoryOptions = [`<option value="">全部分类</option>`, ...availableCategories.map(category => `<option value="${escapeHtml(category)}" ${category === selectedProductCategory ? 'selected' : ''}>${escapeHtml(category)}</option>`)].join('');
    if (topCard) {
      topCard.innerHTML = `<div class="top-head"><div class="ct">产品销售TOP10 <span class="info" id="top10Info" role="button" tabindex="0" aria-controls="top10Note" aria-expanded="false">?</span></div><div class="product-actions"><select class="category-filter" id="productCategoryFilter" aria-label="产品分类筛选">${categoryOptions}</select><button class="more link-btn" id="allProductSalesLink" type="button">更多 ›</button></div></div><div class="note-chip" id="top10Note" hidden>不含服务费产品、玩具</div><div class="rank-list">${rankHtml || '<div class="rank"><span class="num">-</span><span>暂无数据</span><span class="cnt">0份</span></div>'}</div>`;
    }
    const categoryFilter = document.getElementById('productCategoryFilter');
    if (categoryFilter) categoryFilter.addEventListener('change', event => { selectedProductCategory = event.target.value; renderProducts(); });
    const allProductSalesLink = document.getElementById('allProductSalesLink');
    if (allProductSalesLink) allProductSalesLink.addEventListener('click', () => showAllProductSales(allProducts));
    bindTop10Info();
  };  productDetailBack.addEventListener('click', closeProductDetail);
  function renderDashboard() {
    renderSelectedTime();
    renderMetrics();
    renderManagementSummary();
    renderChart();
    renderWeek();
    renderOwnership();
    renderChannelDetail();
    renderProducts();
  }
  function renderMonth() {
    selectedYear.textContent = `${monthState.year}年`;
    renderDashboard();
  }
  const renderYearPicker = () => {
    const dataYears = [...new Set(records.map(row => Math.floor(row.m / 100)))];
    const firstYear = Math.min(...dataYears, currentLimit.year - 5);
    const years = Array.from({ length: currentLimit.year - firstYear + 1 }, (_, index) => currentLimit.year - index);
    const minSelectableYear = currentLimit.year - 2;
    yearGrid.innerHTML = years.map(year => {
      const disabled = year < minSelectableYear || year > currentLimit.year;
      return `<button class="year-option ${year === monthState.year ? 'on' : ''} ${disabled ? 'muted' : ''}" type="button" data-year="${year}" ${disabled ? 'disabled' : ''}>${year}年</button>`;
    }).join('');
    yearGrid.querySelectorAll('.year-option').forEach(btn => btn.onclick = () => {
      if (btn.disabled) return;
      monthState.year = Number(btn.dataset.year);
      yearPicker.hidden = true;
      renderMonth();
    });
  };
  document.querySelectorAll('.tab').forEach(tab => tab.onclick = () => { const text = tab.textContent.trim(); if (text === '月度') window.location.href = 'monthly.html'; else if (text === '自定义') window.location.href = 'custom.html'; });
  document.getElementById('yearTrigger').onclick = () => { yearPicker.hidden = false; renderYearPicker(); };
  document.getElementById('pickerMask').onclick = () => { yearPicker.hidden = true; };
  document.addEventListener('click', event => {
    if (!(event.target instanceof Element) || !event.target.closest('.chart')) hideChartTip();
  });
  document.addEventListener('scroll', hideChartTip, true);
  window.addEventListener('resize', hideChartTip);
  excludeToggle.onclick = () => {
    const active = !excludeToggle.classList.contains('on');
    excludeToggle.classList.toggle('on', active);
    excludeToggle.setAttribute('aria-pressed', String(active));
    renderDashboard();
  };
  renderMonth();
})();
</script>
</body>
</html>
