<script>
(() => {
  const source = window.SST_REVENUE_DATA || { records: [], budgets: {}, normalOrderType: '' };
  const records = source.records || [];
  const budgets = source.budgets || {};
  const normalOrderType = source.normalOrderType || '';
  const pad = value => String(value).padStart(2, '0');
  const keyOf = (year, month) => year * 100 + month;
  const monthEnd = (year, month) => pad(new Date(year, month, 0).getDate());
  const monthLabel = key => `${Math.floor(key / 100)}年${key % 100}月`;
  const maxDataDate = records.reduce((max, row) => !max || row.d > max ? row.d : max, '');
  const maxDateParts = (maxDataDate || new Date().toISOString().slice(0, 10)).split('-').map(Number);
  const currentLimit = { year: maxDateParts[0], month: maxDateParts[1] };
  const monthState = { year: maxDateParts[0], month: maxDateParts[1] };
  const selectedMonth = document.getElementById('selectedMonth');
  const selectedTime = document.getElementById('selectedTime');
  const monthPicker = document.getElementById('monthPicker');
  const pickerYear = document.getElementById('pickerYear');
  const excludeToggle = document.getElementById('excludeToggle');
  const isFutureMonth = (year, month) => year > currentLimit.year || (year === currentLimit.year && month > currentLimit.month);
  const prevMonthKey = key => {
    const year = Math.floor(key / 100);
    const month = key % 100;
    return month === 1 ? (year - 1) * 100 + 12 : year * 100 + month - 1;
  };
  const shouldExcludeGroup = () => excludeToggle.classList.contains('on');
  const rowsFor = (key, excludeGroup = shouldExcludeGroup(), dayLimit = null) => records.filter(row => {
    const inMonth = row.m === key;
    const inOrderScope = !excludeGroup || row.type === normalOrderType;
    const inDayScope = dayLimit == null || Number(row.d.slice(8, 10)) <= dayLimit;
    return inMonth && inOrderScope && inDayScope;
  });
  const sum = (rows, field) => rows.reduce((total, row) => total + Number(row[field] || 0), 0);
  const summary = (key, dayLimit = null) => {
    const rows = rowsFor(key, shouldExcludeGroup(), dayLimit);
    const revenue = sum(rows, 'revenue');
    const orders = sum(rows, 'orders');
    const budget = Number(budgets[String(key)] || 0);
    return { rows, revenue, orders, ticket: orders ? revenue / orders : 0, budget, completion: budget ? revenue / budget * 100 : 0 };
  };
  const compareDayLimit = key => {
    const rows = rowsFor(key);
    if (!rows.length) return null;
    const year = Math.floor(key / 100);
    const month = key % 100;
    const lastDataDay = Math.max(...rows.map(row => Number(row.d.slice(8, 10))));
    const daysInMonth = new Date(year, month, 0).getDate();
    return lastDataDay < daysInMonth ? lastDataDay : null;
  };
  const formatInt = value => Math.round(value).toLocaleString('en-US');
  const formatMoney = value => `¥ ${formatInt(value)}`;
  const formatPct = value => `${Math.round(value)}%`;
  const formatSignedPct = value => `${value >= 0 ? '+' : ''}${value.toFixed(1)}%`;
  const dayText = day => `${pad(monthState.month)}-${pad(day)}`;
  const latestDataDay = key => {
    const rows = rowsFor(key);
    return rows.length ? Math.max(...rows.map(row => Number(row.d.slice(8, 10)))) : 0;
  };
  const formatAxis = value => value >= 10000 ? `${Number((value / 10000).toFixed(value % 10000 ? 1 : 0))}万` : formatInt(value);
  const formatTrendAxis = value => value === 0 ? '0' : `${Number((value / 10000).toFixed(1))}万`;
  const trendMax = value => Math.max(12000, Math.ceil(value / 3000) * 3000);
  const niceMax = value => {
    if (value <= 12000) return 12000;
    if (value <= 20000) return 20000;
    if (value <= 30000) return 30000;
    if (value <= 60000) return 60000;
    if (value <= 100000) return 100000;
    return Math.ceil(value / 100000) * 100000;
  };
  const setGrowth = (selector, current, previous) => {
    const el = document.querySelector(selector);
    if (!previous) { el.textContent = '--'; el.classList.remove('down'); return; }
    const pct = (current - previous) / previous * 100;
    el.textContent = `${pct >= 0 ? '+' : ''}${pct.toFixed(1)}% ${pct >= 0 ? '↑' : '↓'}`;
    el.classList.toggle('down', pct < 0);
  };
  const dailyMap = (key, dayLimit = null) => {
    const map = new Map();
    rowsFor(key, shouldExcludeGroup(), dayLimit).forEach(row => {
      const day = Number(row.d.slice(8, 10));
      const current = map.get(day) || { revenue: 0, orders: 0 };
      current.revenue += Number(row.revenue || 0);
      current.orders += Number(row.orders || 0);
      map.set(day, current);
    });
    return map;
  };
  const renderMetrics = () => {
    const key = keyOf(monthState.year, monthState.month);
    const cur = summary(key);
    const compareLimit = compareDayLimit(key);
    const prev = summary(prevMonthKey(key), compareLimit);
    const hasData = cur.rows.length > 0;
    document.querySelector('.metric.revenue .value').textContent = hasData ? `${(cur.revenue / 10000).toFixed(1)}万` : '--';
    document.querySelector('.metric.order .value').textContent = hasData ? formatInt(cur.orders) : '--';
    document.querySelector('.metric.ticket .value').textContent = hasData ? `¥${cur.ticket.toFixed(1)}` : '--';
    if (!hasData) {
      document.querySelectorAll('.metric .up').forEach(el => { el.textContent = '--'; el.classList.remove('down'); });
      return;
    }
    setGrowth('.metric.revenue .up', cur.revenue, prev.revenue);
    setGrowth('.metric.order .up', cur.orders, prev.orders);
    setGrowth('.metric.ticket .up', cur.ticket, prev.ticket);
  };
  const renderManagementSummary = () => {
    const key = keyOf(monthState.year, monthState.month);
    const cur = summary(key);
    const compareLimit = compareDayLimit(key);
    const prev = summary(prevMonthKey(key), compareLimit);
    const opsSummary = document.getElementById('opsSummary');
    if (!opsSummary) return;
    if (!cur.rows.length) {
      opsSummary.innerHTML = ['预算', '预计月底', '剩余日均目标'].map(label => `<div class="ops-item"><span>${label}</span><b>--</b><em>暂无数据</em></div>`).join('');
      return;
    }
    const daysInMonth = Number(monthEnd(monthState.year, monthState.month));
    const elapsedDays = latestDataDay(key) || daysInMonth;
    const remainingDays = Math.max(daysInMonth - elapsedDays, 0);
    const dailyAvg = elapsedDays ? cur.revenue / elapsedDays : 0;
    const forecastRevenue = dailyAvg * daysInMonth;
    const forecastCompletion = cur.budget ? forecastRevenue / cur.budget * 100 : 0;
    const budgetGap = cur.revenue - cur.budget;
    const requiredDaily = remainingDays && budgetGap < 0 ? Math.abs(budgetGap) / remainingDays : 0;
    const requiredDailyText = budgetGap >= 0 ? '已达成' : (remainingDays ? formatMoney(requiredDaily) : '未达成');
    const budgetGrowth = prev.budget ? cur.completion - prev.completion : null;
    const budgetGrowthText = budgetGrowth === null ? '--' : `${budgetGrowth >= 0 ? '+' : ''}${budgetGrowth.toFixed(1)}% ${budgetGrowth >= 0 ? '↑' : '↓'}`;
    const budgetGrowthClass = budgetGrowth !== null && budgetGrowth < 0 ? 'down' : '';
    opsSummary.innerHTML = [
      `<div class="ops-item budget-kpi good"><span>预算</span><b>${formatPct(cur.completion)}</b><em>较上月 <i class="ops-growth ${budgetGrowthClass}">${budgetGrowthText}</i></em></div>`,
      `<div class="ops-item ${forecastCompletion >= 100 ? 'good' : 'warn'}"><span>预计月底</span><b>${formatPct(forecastCompletion)}</b><em>按当前日均</em></div>`,
      `<div class="ops-item ${requiredDaily ? 'warn' : 'good'}"><span>剩余日均目标</span><b>${requiredDailyText}</b><em>${remainingDays ? `剩余${remainingDays}天` : `${elapsedDays}天完成`}</em></div>`
    ].join('');
  };
  const renderSelectedTime = () => {
    const rows = rowsFor(keyOf(monthState.year, monthState.month));
    if (rows.length) {
      const dates = rows.map(row => row.d).sort();
      selectedTime.textContent = `已选时间： ${dates[0]} 至 ${dates[dates.length - 1]}`;
    } else {
      selectedTime.textContent = '暂无数据';
    }
  };
  const hideChartTip = () => {
    const activeTip = document.querySelector('.chart-tip.show');
    if (activeTip) activeTip.classList.remove('show');
  };
  const renderChart = () => {
    hideChartTip();
    const key = keyOf(monthState.year, monthState.month);
    const prevKey = prevMonthKey(key);
    document.getElementById('currentLegend').textContent = monthLabel(key);
    document.getElementById('prevLegend').textContent = monthLabel(prevKey);
    const compareLimit = compareDayLimit(key);
    const curDaily = dailyMap(key);
    const chart = document.querySelector('.chart');
    if (!curDaily.size) {
      chart.innerHTML = '<div class="chart-empty">暂无营收数据</div>';
      return;
    }
    const prevDaily = dailyMap(prevKey, compareLimit);
    const curDays = new Date(monthState.year, monthState.month, 0).getDate();
    const prevDate = new Date(monthState.year, monthState.month - 2, 1);
    const prevDays = new Date(prevDate.getFullYear(), prevDate.getMonth() + 1, 0).getDate();
    const maxValue = trendMax(Math.max(1, ...[...curDaily.values(), ...prevDaily.values()].map(item => item.revenue)));
    const plot = { left: 42, right: 344, top: 14, bottom: 88 };
    const xFor = (day, days = curDays) => plot.left + (day - 1) * ((plot.right - plot.left) / Math.max(days - 1, 1));
    const yFor = value => plot.bottom - Math.min(value, maxValue) / maxValue * (plot.bottom - plot.top);
    const pathFor = (map, days) => {
      const points = [...map.entries()].sort((a, b) => a[0] - b[0]).map(([day, item]) => ({ x: xFor(day, days), y: yFor(item.revenue) }));
      if (!points.length) return '';
      if (points.length === 1) return `M${points[0].x.toFixed(1)} ${points[0].y.toFixed(1)}`;
      return points.map((point, index) => {
        if (index === 0) return `M${point.x.toFixed(1)} ${point.y.toFixed(1)}`;
        const prev = points[index - 1];
        const cp1x = prev.x + (point.x - prev.x) * .45;
        const cp2x = point.x - (point.x - prev.x) * .45;
        return `C${cp1x.toFixed(1)} ${prev.y.toFixed(1)} ${cp2x.toFixed(1)} ${point.y.toFixed(1)} ${point.x.toFixed(1)} ${point.y.toFixed(1)}`;
      }).join(' ');
    };
    const holidayRules = key === 202606 ? [{ start: 19, end: 21, festivalDay: 19, name: '\u7aef\u5348' }] : [];
    const holidayForDay = day => holidayRules.find(rule => day >= rule.start && day <= rule.end);
    const holidayCenterDay = rule => rule.festivalDay || Math.round((rule.start + rule.end) / 2);
    const xTicks = [...new Set([1, 7, 13, 19, 25, curDays].filter(day => day <= curDays))];
    const visibleDays = new Set([...xTicks, ...holidayRules.map(holidayCenterDay)]);
    const compareText = day => {
      const cur = curDaily.get(day)?.revenue || 0;
      const prev = prevDaily.get(day)?.revenue || 0;
      if (!prev) return '\u8f83\u4e0a\u6708\u540c\u65e5 --';
      const pct = (cur - prev) / prev * 100;
      return `\u8f83\u4e0a\u6708\u540c\u65e5 ${pct >= 0 ? '+' : ''}${pct.toFixed(1)}%`;
    };
    const tipFor = (day, item) => {
      const holiday = holidayForDay(day);
      const lines = [`<b>${monthState.year}-${pad(monthState.month)}-${pad(day)}</b>`, `\u8425\u6536 ${formatMoney(item.revenue)}`, compareText(day)];
      if (holiday) lines.push(`\u8282\u5047\u65e5 ${holiday.name}`);
      return lines.join('<br>');
    };
    const curMarks = [...curDaily.entries()].sort((a, b) => a[0] - b[0]).map(([day, item]) => {
      const x = xFor(day).toFixed(1);
      const y = yFor(item.revenue).toFixed(1);
      const holiday = holidayForDay(day);
      const isHolidayCenter = holiday && day === holidayCenterDay(holiday);
      const showPoint = visibleDays.has(day);
      const holidayDot = isHolidayCenter ? `<circle class="holiday-dot" cx="${x}" cy="${y}" r="3.2"></circle>` : '';
      const dot = showPoint && !isHolidayCenter ? `<circle class="dot" cx="${x}" cy="${y}" r="2.7"></circle>` : '';
      const accessibleTip = `${monthState.year}-${pad(monthState.month)}-${pad(day)} 营收 ${formatMoney(item.revenue)}${holiday ? ` ${holiday.name}` : ''}`;
      return `${holidayDot}${dot}<circle class="chart-hit" cx="${x}" cy="${y}" r="9" tabindex="0" role="button" aria-label="${escapeHtml(accessibleTip)}" data-tip="${escapeHtml(tipFor(day, item))}"></circle>`;
    }).join('');
    const yTicks = [maxValue, maxValue * .75, maxValue * .5, maxValue * .25, 0];
    const ySvg = yTicks.map(value => {
      const y = yFor(value).toFixed(1);
      const lineClass = value === 0 ? 'axis-line' : 'grid';
      return `<line class="${lineClass}" x1="${plot.left}" y1="${y}" x2="350" y2="${y}"></line><text x="7" y="${(Number(y) + 3).toFixed(1)}">${formatTrendAxis(value)}</text>`;
    }).join('');
    const xSvg = xTicks.map(day => `<text x="${xFor(day).toFixed(1)}" y="119" text-anchor="middle">${pad(day)}</text>`).join('');
    const holidaySvg = holidayRules.map(rule => {
      if (rule.start === rule.end) return '';
      const x = xFor(rule.start) - 2;
      const width = xFor(rule.end) - xFor(rule.start) + 4;
      return `<rect class="holiday-axis-band" x="${x.toFixed(1)}" y="${(plot.bottom - 1.5).toFixed(1)}" width="${width.toFixed(1)}" height="4" rx="2"></rect>`;
    }).join('');

    chart.innerHTML = `<svg viewBox="0 0 360 126" role="img" aria-label="每日营收趋势折线图">${ySvg}<path class="prev" d="${pathFor(prevDaily, prevDays)}"></path><path class="cur" d="${pathFor(curDaily, curDays)}"></path>${curMarks}${holidaySvg}${xSvg}</svg><div class="chart-tip" id="chartTip" role="status" aria-live="polite"></div>`;
    const tip = document.getElementById('chartTip');
    const showTip = (hitEl, event) => {
      event?.stopPropagation();
      const rect = chart.getBoundingClientRect();
      const cx = Number(hitEl.getAttribute('cx')) / 360 * rect.width;
      const cy = Number(hitEl.getAttribute('cy')) / 126 * rect.height;
      const eventX = event.clientX ? event.clientX - rect.left : cx;
      const eventY = event.clientY ? event.clientY - rect.top : cy;
      const x = Math.min(Math.max(eventX, 76), rect.width - 76);
      tip.innerHTML = hitEl.dataset.tip;
      tip.style.left = `${x}px`;
      tip.style.top = `${Math.max(8, eventY - 58)}px`;
      tip.classList.add('show');
    };
    document.querySelectorAll('.chart-hit').forEach(hitEl => {
      hitEl.addEventListener('click', event => showTip(hitEl, event));
      hitEl.addEventListener('keydown', event => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          showTip(hitEl, event);
        }
      });
    });
    chart.addEventListener('click', event => {
      if (!event.target.closest('.chart-hit')) hideChartTip();
    });
    chart.onmouseleave = hideChartTip;
  };
  const renderWeek = () => {
    const labels = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
    const map = dailyMap(keyOf(monthState.year, monthState.month));
    const axis = document.querySelector('.week-chart .axis');
    const bars = document.querySelector('.week-chart .bars');
    if (!map.size) {
      axis.innerHTML = '<span>--</span><span>--</span><span>--</span><span>0</span>';
      bars.innerHTML = '<div class="chart-empty" style="grid-column:1 / -1">暂无数据</div>';
      return;
    }
    const buckets = labels.map(label => ({ label, total: 0, days: 0 }));
    map.forEach((item, day) => {
      const index = (new Date(monthState.year, monthState.month - 1, day).getDay() + 6) % 7;
      buckets[index].total += item.revenue;
      buckets[index].days += 1;
    });
    const values = buckets.map(bucket => bucket.days ? bucket.total / bucket.days : 0);
    const maxValue = niceMax(Math.max(1, ...values));
    axis.innerHTML = `<span>${formatAxis(maxValue)}</span><span>${formatAxis(maxValue / 2)}</span><span>${formatAxis(maxValue / 4)}</span><span>0</span>`;
    bars.innerHTML = buckets.map((bucket, index) => {
      const value = values[index];
      const height = Math.max(12, Math.round(value / maxValue * 67));
      return `<div class="vbar" style="--h:${height}px" data-v="${formatAxis(value)}" data-d="${bucket.label}"></div>`;
    }).join('');
  };
  const renderOwnership = () => {
    const rows = rowsFor(keyOf(monthState.year, monthState.month));
    const ownership = document.querySelector('.ownership');
    if (!rows.length) {
      ownership.innerHTML = '<div class="data-empty">暂无业务归属数据</div>';
      return;
    }
    const totalRevenue = sum(rows, 'revenue');
    const buildStats = biz => {
      const groupRows = rows.filter(row => row.biz === biz);
      const revenue = sum(groupRows, 'revenue');
      const orders = sum(groupRows, 'orders');
      return { biz, revenue, orders, ticket: orders ? revenue / orders : 0, pct: totalRevenue ? revenue / totalRevenue * 100 : 0 };
    };
    const dine = buildStats('\u5802\u98df');
    const take = buildStats('\u5916\u9001');
    const dinePct = Math.max(0, Math.min(100, dine.pct));
    const icon = type => type === 'dine'
      ? '<img src="assets/business-dine-icon.png?v=20260710" alt="">'
      : '<img src="assets/business-delivery-icon.png?v=20260710" alt="">';
    const hero = (item, cls, colorVar, softVar, type) => `<div class="own-hero ${cls}" style="--c:var(${colorVar});--soft:${softVar}"><span class="own-icon">${icon(type)}</span><div><span class="own-label">${item.biz}</span><strong class="own-pct">${item.pct.toFixed(1)}%</strong></div></div>`;
    const income = item => `<div><span>${item.biz}收入</span><b>${formatMoney(item.revenue)}</b></div>`;
    const statCard = (item, cls, colorVar) => `<div class="own-stat-card ${cls}" style="--c:var(${colorVar})"><div class="own-stat-title"><i></i><span>${item.biz}</span></div><div class="own-stat-grid"><div><span class="own-stat-label">订单</span><b class="own-stat-value">${formatInt(item.orders)}<small class="own-unit">单</small></b></div><span class="own-sep"></span><div><span class="own-stat-label">客单价</span><b class="own-stat-value">¥ ${item.ticket.toFixed(1)}</b></div></div></div>`;
    ownership.innerHTML = `<div class="own-top">${hero(dine, 'dine', '--yellow2', '#fff4cd', 'dine')}${hero(take, 'take', '--blue', '#eaf3ff', 'take')}</div><div class="own-stack" style="--dine:${dinePct.toFixed(1)}%"><span></span><span></span></div><div class="own-income">${income(dine)}${income(take)}</div><div class="own-divider"></div><div class="own-detail-cards">${statCard(dine, 'dine', '--yellow2')}${statCard(take, 'take', '--blue')}</div>`;
  };
  const renderChannelDetail = () => {
    const rows = rowsFor(keyOf(monthState.year, monthState.month));
    const totalRevenue = sum(rows, 'revenue');
    const map = new Map();
    rows.forEach(row => {
      const key = `${row.biz}||${row.channel}`;
      if (!map.has(key)) map.set(key, { biz: row.biz, channel: row.channel, revenue: 0, orders: 0 });
      const item = map.get(key);
      item.revenue += Number(row.revenue || 0);
      item.orders += Number(row.orders || 0);
    });
    const items = [...map.values()].sort((a, b) => b.revenue - a.revenue);
    const maxRevenue = Math.max(1, ...items.map(item => item.revenue));
    const rowHtml = items.map(item => {
      const isDine = item.biz === '\u5802\u98df';
      const colorVar = isDine ? '--yellow2' : '--blue';
      const tagBg = isDine ? '#fff4c6' : '#edf4ff';
      const tagColor = isDine ? '#9a7200' : '#2f75d6';
      const showBizTag = item.channel === '\u5c0f\u7a0b\u5e8f';
      const ticket = item.orders ? item.revenue / item.orders : 0;
      const share = totalRevenue ? item.revenue / totalRevenue * 100 : 0;
      const barWidth = Math.max(3, item.revenue / maxRevenue * 100);
      return `<div class="ch-row" style="--c:var(${colorVar});--tag-bg:${tagBg};--tag-c:${tagColor}"><span class="ch-name"><i></i><b>${escapeHtml(channelLabel(item.channel))}</b>${showBizTag ? `<em>${escapeHtml(item.biz)}</em>` : ''}</span><span class="ch-num"><b>${formatMoney(item.revenue)}</b><em class="ch-share"><i style="--w:${barWidth.toFixed(0)}%"></i><small>${share.toFixed(1)}%</small></em></span><span class="ch-order">${formatInt(item.orders)}\u5355</span><span class="ch-ticket">\u00a5 ${ticket.toFixed(1)}</span></div>`;
    }).join('');
    document.querySelector('.ch-body').innerHTML = rowHtml || '<div class="detail-empty">\u6682\u65e0\u6e20\u9053\u6570\u636e</div>';
  };
  const channelLabel = name => name === '\u95e8\u5e97\u5802\u98df' ? '\u5802\u98dfPOS' : name;
  const productRowsFor = key => (source.products || []).filter(row => row.m === key && (!shouldExcludeGroup() || row.type === normalOrderType));
  const productDetailPage = document.getElementById('productDetailPage');
  const productDetailBack = document.getElementById('productDetailBack');
  const productDetailTitle = document.getElementById('productDetailTitle');
  const productDetailSub = document.getElementById('productDetailSub');
  const productDetailContent = document.getElementById('productDetailContent');
  const escapeHtml = value => String(value ?? '').replace(/[&<>"']/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
  const currentProductRows = () => productRowsFor(keyOf(monthState.year, monthState.month));
  const productScopeText = () => `${monthState.year}\u5e74${monthState.month}\u6708 \u00b7 ${shouldExcludeGroup() ? '\u5df2\u5254\u9664\u56e2\u8ba2' : '\u542b\u56e2\u8ba2'}`;
  const closeProductDetail = () => { productDetailPage.hidden = true; };
  const openProductDetail = (title, html) => {
    productDetailTitle.textContent = title;
    productDetailSub.textContent = productScopeText();
    productDetailContent.innerHTML = html;
    productDetailPage.hidden = false;
  };
  const excludedProductTerms = ['\u670d\u52a1\u8d39', '\u73a9\u5177'];
  const filteredProductRows = rows => rows.filter(row => !excludedProductTerms.some(term => `${row.category}${row.name}`.includes(term)));
  const productSalesRows = rows => {
    const byProduct = new Map();
    filteredProductRows(rows).forEach(row => {
      const key = `${row.code}|${row.name}`;
      const current = byProduct.get(key) || { name: row.name, category: row.category, qty: 0, income: 0 };
      current.qty += Number(row.qty || 0);
      current.income += Number(row.income || 0);
      byProduct.set(key, current);
    });
    return [...byProduct.values()].sort((a, b) => b.qty - a.qty);
  };
  const showAllProductSales = products => {
    const html = products.map((item, index) => `<div class="detail-row"><span class="detail-name">${index + 1}. ${escapeHtml(item.name)}</span><b>${formatInt(item.qty)}\u4efd</b><b>${formatMoney(item.income)}</b></div>`).join('') || '<div class="detail-empty">\u6682\u65e0\u4ea7\u54c1\u9500\u552e\u6570\u636e</div>';
    openProductDetail('\u5168\u90e8\u4ea7\u54c1\u9500\u552e', html);
  };
  const bindTop10Info = () => {
    const top10Info = document.getElementById('top10Info');
    const top10Note = document.getElementById('top10Note');
    if (!top10Info || !top10Note) return;
    const toggleTop10Note = () => {
      const visible = top10Note.hidden;
      top10Note.hidden = !visible;
      top10Info.setAttribute('aria-expanded', String(visible));
    };
    top10Info.addEventListener('click', toggleTop10Note);
    top10Info.addEventListener('keydown', event => {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        toggleTop10Note();
      }
    });
  };
  const renderProducts = () => {
    const topCard = document.querySelector('.product-top-card');
    const productRows = currentProductRows();
    const allProducts = productSalesRows(productRows);
    const topProducts = allProducts.slice(0, 10);
    const maxProductQty = Math.max(1, ...topProducts.map(item => item.qty));
    const rankHtml = topProducts.map((item, index) => `<div class="rank"><span class="num ${index < 3 ? 'hot' : ''}">${index + 1}</span><div class="rank-main"><span class="rank-name" title="${escapeHtml(item.name)}">${escapeHtml(item.name)}</span><span class="rank-bar"><i style="--w:${Math.max(6, item.qty / maxProductQty * 100).toFixed(0)}%"></i></span></div><span class="cnt">${formatInt(item.qty)}份</span></div>`).join('');
    if (topCard) {
      topCard.innerHTML = `<div class="top-head"><div class="ct">产品销售TOP10 <span class="info" id="top10Info" role="button" tabindex="0" aria-controls="top10Note" aria-expanded="false">?</span></div><button class="more link-btn" id="allProductSalesLink" type="button">更多 ›</button></div><div class="note-chip" id="top10Note" hidden>不含服务费产品、玩具</div>${rankHtml || '<div class="rank"><span class="num">-</span><span>暂无数据</span><span class="cnt">0份</span></div>'}`;
    }
    const allProductSalesLink = document.getElementById('allProductSalesLink');
    if (allProductSalesLink) allProductSalesLink.addEventListener('click', () => showAllProductSales(allProducts));
    bindTop10Info();
  };
  productDetailBack.addEventListener('click', closeProductDetail);
  function renderDashboard() {
    renderSelectedTime();
    renderMetrics();
    renderManagementSummary();
    renderChart();
    renderWeek();
    renderOwnership();
    renderChannelDetail();
    renderProducts();
  }
  function renderMonth() {
    selectedMonth.textContent = `${monthState.year}年${monthState.month}月`;
    pickerYear.textContent = monthState.year;
    document.querySelectorAll('.month-option').forEach(btn => {
      const month = Number(btn.dataset.month);
      const disabled = isFutureMonth(monthState.year, month);
      btn.classList.toggle('muted', disabled);
      btn.disabled = disabled;
      btn.classList.toggle('on', month === monthState.month);
    });
    renderDashboard();
  }
  document.querySelectorAll('.tab').forEach(tab => tab.onclick = () => { document.querySelectorAll('.tab').forEach(item => item.classList.remove('on')); tab.classList.add('on'); });
  document.getElementById('monthTrigger').onclick = () => { monthPicker.hidden = false; renderMonth(); };
  document.getElementById('pickerMask').onclick = () => { monthPicker.hidden = true; };
  document.getElementById('prevYear').onclick = () => { monthState.year -= 1; renderMonth(); };
  document.getElementById('nextYear').onclick = () => { monthState.year += 1; renderMonth(); };
  document.querySelectorAll('.month-option').forEach(btn => btn.onclick = () => {
    const month = Number(btn.dataset.month);
    if (isFutureMonth(monthState.year, month)) return;
    monthState.month = month;
    monthPicker.hidden = true;
    renderMonth();
  });
  document.addEventListener('click', event => {
    if (!(event.target instanceof Element) || !event.target.closest('.chart')) hideChartTip();
  });
  document.addEventListener('scroll', hideChartTip, true);
  window.addEventListener('resize', hideChartTip);
  excludeToggle.onclick = () => {
    const active = !excludeToggle.classList.contains('on');
    excludeToggle.classList.toggle('on', active);
    excludeToggle.setAttribute('aria-pressed', String(active));
    renderDashboard();
  };
  renderMonth();
})();
</script>
</body>
</html>
