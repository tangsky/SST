<script>
(() => {
  const source = window.SST_REVENUE_DATA || { dailyRecords: [], dailyProducts: [] };
  const dailyRecords = source.dailyRecords || [];
  const dailyProducts = source.dailyProducts || [];
  const dateOptions = [...new Set(dailyRecords.map(row => row.d))].sort();
  const latestDate = source.maxDailyDate || dateOptions[dateOptions.length - 1] || new Date().toISOString().slice(0, 10);
  let selectedDate = latestDate;
  let compareMode = 'yesterday';
  let selectedProductCategory = '';
  const selectedMonth = document.getElementById('selectedMonth');
  const selectedTime = document.getElementById('selectedTime');
  const productDetailPage = document.getElementById('productDetailPage');
  const productDetailBack = document.getElementById('productDetailBack');
  const productDetailTitle = document.getElementById('productDetailTitle');
  const productDetailSub = document.getElementById('productDetailSub');
  const productDetailContent = document.getElementById('productDetailContent');
  const formatDateLabel = date => { const value = new Date(`${date}T00:00:00`); const week = ['\u5468\u65e5', '\u5468\u4e00', '\u5468\u4e8c', '\u5468\u4e09', '\u5468\u56db', '\u5468\u4e94', '\u5468\u516d'][value.getDay()]; return `${date} | ${week}`; };
  const formatShortDate = date => { const [, m, d] = date.split('-').map(Number); return `${m}\u6708${d}\u65e5`; };
  const formatInt = value => Math.round(value).toLocaleString('en-US');
  const formatMoney = value => `\u00a5 ${formatInt(value)}`;
  const formatWan = value => `${Number((value / 10000).toFixed(1))}\u4e07`;
  const formatAxis = value => value >= 10000 ? `${Number((value / 10000).toFixed(1))}\u4e07` : formatInt(value);
  const niceAxisMax = value => {
    if (value <= 0) return 100;
    const exponent = Math.floor(Math.log10(value));
    const base = Math.pow(10, exponent);
    const scaled = value / base;
    const nice = scaled <= 1 ? 1 : scaled <= 2 ? 2 : scaled <= 5 ? 5 : 10;
    return nice * base;
  };
  const axisMaxByStep = (value, step = 200, divisions = 4) => {
    const unit = step * divisions;
    return Math.max(unit, Math.ceil(Math.max(value, 1) / unit) * unit);
  };
  const safePct = (current, previous) => previous ? (current - previous) / previous * 100 : null;
  const formatDeltaPct = value => value === null ? '--' : `${value >= 0 ? '+' : ''}${value.toFixed(1)}%`;
  const growthClass = value => value !== null && value < 0 ? 'down' : '';
  const compareLabel = () => compareMode === 'week' ? '\u5bf9\u6bd4\u4e0a\u5468' : '\u5bf9\u6bd4\u6628\u65e5';
  const compareShortLabel = () => compareMode === 'week' ? '\u4e0a\u5468' : '\u6628\u65e5';
  const escapeHtml = value => String(value ?? '').replace(/[&<>"']/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
  const addDays = (date, offset) => {
    const [year, month, day] = date.split('-').map(Number);
    const value = new Date(year, month - 1, day + offset);
    const y = value.getFullYear();
    const m = String(value.getMonth() + 1).padStart(2, '0');
    const d = String(value.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  };
  const rowsForDate = date => dailyRecords.filter(row => row.d === date);
  const productsForDate = date => dailyProducts.filter(row => row.d === date);
  const compareDate = () => {
    const target = addDays(selectedDate, compareMode === 'week' ? -7 : -1);
    return dateOptions.includes(target) ? target : '';
  };
  const sum = (rows, field) => rows.reduce((total, row) => total + Number(row[field] || 0), 0);
  const summary = date => {
    const rows = rowsForDate(date);
    const revenue = sum(rows, 'revenue');
    const orders = sum(rows, 'orders');
    return { rows, revenue, orders, ticket: orders ? revenue / orders : 0 };
  };
  const setGrowth = (selector, current, previous) => {
    const el = document.querySelector(selector);
    const pct = safePct(current, previous);
    if (!el) return;
    el.textContent = pct === null ? '--' : `${formatDeltaPct(pct)} ${pct >= 0 ? '\u2191' : '\u2193'}`;
    el.classList.toggle('down', pct !== null && pct < 0);
  };
  const updateCompareLabels = () => {
    document.querySelectorAll('.metric-row span:first-child').forEach(el => { el.textContent = compareLabel(); });
    document.querySelectorAll('.compare-option').forEach(btn => btn.classList.toggle('on', btn.dataset.compare === compareMode));
  };
  const renderSelectedTime = () => {
    const scope = document.getElementById('dataScope');
    const groupImpact = document.getElementById('groupImpact');
    selectedMonth.textContent = formatDateLabel(selectedDate);
    selectedTime.textContent = `\u6570\u636e\u66f4\u65b0\u65f6\u95f4\uff1a${selectedDate}`;
    if (scope) { scope.hidden = true; scope.textContent = ''; }
    if (groupImpact) { groupImpact.hidden = true; groupImpact.textContent = ''; }
  };
  const renderMetrics = () => {
    const cur = summary(selectedDate);
    const prev = summary(compareDate());
    const hasData = cur.rows.length > 0;
    document.querySelector('.metric.revenue .value').textContent = hasData ? formatMoney(cur.revenue) : '--';
    document.querySelector('.metric.order .value').textContent = hasData ? formatInt(cur.orders) : '--';
    document.querySelector('.metric.ticket .value').textContent = hasData ? `\u00a5${cur.ticket.toFixed(1)}` : '--';
    setGrowth('.metric.revenue .up', cur.revenue, prev.revenue);
    setGrowth('.metric.order .up', cur.orders, prev.orders);
    setGrowth('.metric.ticket .up', cur.ticket, prev.ticket);
  };
  const slotMap = rows => {
    const map = new Map();
    rows.forEach(row => {
      const hourSlot = Math.floor(Number(row.slot || 0) / 60) * 60;
      const hourLabel = `${String(Math.floor(hourSlot / 60)).padStart(2, '0')}:00`;
      const current = map.get(hourSlot) || { slot: hourSlot, time: hourLabel, revenue: 0, orders: 0 };
      current.revenue += Number(row.revenue || 0);
      current.orders += Number(row.orders || 0);
      map.set(hourSlot, current);
    });
    return [...map.values()].sort((a, b) => a.slot - b.slot);
  };
  const hideChartTip = () => {
    const activeTip = document.querySelector('.chart-tip.show');
    if (activeTip) activeTip.classList.remove('show');
  };
  const renderChart = () => {
    hideChartTip();
    const curRows = slotMap(rowsForDate(selectedDate));
    const prevDate = compareDate();
    const prevRows = slotMap(rowsForDate(prevDate));
    const chart = document.querySelector('.chart');
    document.getElementById('currentLegend').textContent = formatShortDate(selectedDate);
    document.getElementById('prevLegend').textContent = prevDate ? `${compareShortLabel()} ${formatShortDate(prevDate)}` : `${compareShortLabel()}\u65e0\u6570\u636e`;
    const note = document.querySelector('.holiday-note');
    if (note) note.textContent = '\u6574\u5c0f\u65f6\u6c47\u603b';
    if (!curRows.length) {
      chart.innerHTML = '<div class="chart-empty">\u6682\u65e0\u8425\u6536\u6570\u636e</div>';
      return;
    }
    const allSlots = [...new Set([...curRows, ...prevRows].map(item => item.slot))].sort((a, b) => a - b);
    const slotIndex = new Map(allSlots.map((slot, index) => [slot, index]));
    const maxValue = axisMaxByStep(Math.max(1, ...curRows.map(item => item.revenue), ...prevRows.map(item => item.revenue)), 200, 4);
    const plot = { left: 42, right: 344, top: 14, bottom: 88 };
    const xFor = slot => plot.left + (slotIndex.get(slot) || 0) * ((plot.right - plot.left) / Math.max(allSlots.length - 1, 1));
    const yFor = value => plot.bottom - Math.min(value, maxValue) / maxValue * (plot.bottom - plot.top);
    const pathFor = rows => rows.map((item, index) => `${index ? 'L' : 'M'}${xFor(item.slot).toFixed(1)} ${yFor(item.revenue).toFixed(1)}`).join('');
    const yTicks = [maxValue, maxValue * .75, maxValue * .5, maxValue * .25, 0];
    const ySvg = yTicks.map(value => { const y = yFor(value).toFixed(1); return `<line class="${value === 0 ? 'axis-line' : 'grid'}" x1="${plot.left}" y1="${y}" x2="350" y2="${y}"></line><text x="7" y="${(Number(y) + 3).toFixed(1)}">${formatAxis(value)}</text>`; }).join('');
    const tickIndexes = [...new Set([0, Math.floor((allSlots.length - 1) / 3), Math.floor((allSlots.length - 1) * 2 / 3), allSlots.length - 1].filter(index => index >= 0))];
    const labelForSlot = slot => curRows.find(item => item.slot === slot)?.time || prevRows.find(item => item.slot === slot)?.time || '';
    const xSvg = tickIndexes.map(index => `<text x="${xFor(allSlots[index]).toFixed(1)}" y="119" text-anchor="middle">${labelForSlot(allSlots[index])}</text>`).join('');
    const prevBySlot = new Map(prevRows.map(item => [item.slot, item]));
    const curMarks = curRows.map(item => {
      const x = xFor(item.slot).toFixed(1), y = yFor(item.revenue).toFixed(1);
      const prev = prevBySlot.get(item.slot);
      const pct = prev ? safePct(item.revenue, prev.revenue) : null;
      const tip = `<b>${selectedDate} ${item.time}</b><br>\u8425\u6536 ${formatMoney(item.revenue)}<br>\u8ba2\u5355 ${formatInt(item.orders)}\u5355<br>${compareLabel()} ${formatDeltaPct(pct)}`;
      return `<circle class="dot" cx="${x}" cy="${y}" r="2.7"></circle><circle class="chart-hit" cx="${x}" cy="${y}" r="9" tabindex="0" role="button" aria-label="${escapeHtml(`${selectedDate} ${item.time} revenue ${formatMoney(item.revenue)}`)}" data-tip="${escapeHtml(tip)}"></circle>`;
    }).join('');
    chart.innerHTML = `<svg viewBox="0 0 360 126" role="img" aria-label="\u5206\u65f6\u8425\u6536\u8d8b\u52bf\u6298\u7ebf\u56fe">${ySvg}<path class="prev" d="${pathFor(prevRows)}"></path><path class="cur" d="${pathFor(curRows)}"></path>${curMarks}${xSvg}</svg><div class="chart-tip" id="chartTip" role="status" aria-live="polite"></div>`;
    const tip = document.getElementById('chartTip');
    const showTip = (hitEl, event) => {
      event?.stopPropagation();
      const rect = chart.getBoundingClientRect();
      const eventX = event.clientX ? event.clientX - rect.left : Number(hitEl.getAttribute('cx')) / 360 * rect.width;
      const eventY = event.clientY ? event.clientY - rect.top : Number(hitEl.getAttribute('cy')) / 126 * rect.height;
      tip.innerHTML = hitEl.dataset.tip;
      tip.style.left = `${Math.min(Math.max(eventX, 76), rect.width - 76)}px`;
      tip.style.top = `${Math.max(8, eventY - 58)}px`;
      tip.classList.add('show');
    };
    document.querySelectorAll('.chart-hit').forEach(hitEl => {
      hitEl.addEventListener('click', event => showTip(hitEl, event));
      hitEl.addEventListener('keydown', event => { if (event.key === 'Enter' || event.key === ' ') { event.preventDefault(); showTip(hitEl, event); } });
    });
    chart.addEventListener('click', event => { if (!event.target.closest('.chart-hit')) hideChartTip(); });
    chart.onmouseleave = hideChartTip;
  };
  const renderWeek = () => {
    const rows = rowsForDate(selectedDate);
    const axis = document.querySelector('.week-chart .axis');
    const bars = document.querySelector('.week-chart .bars');
    if (!rows.length) {
      axis.innerHTML = '<span>--</span><span>--</span><span>--</span><span>0</span>';
      bars.innerHTML = '<div class="chart-empty" style="grid-column:1 / -1">\u6682\u65e0\u6570\u636e</div>';
      return;
    }
    const periodLabel = label => label === '\u901a\u5bb5' ? '\u51cc\u6668' : label;
    const order = ['\u901a\u5bb5', '\u65e9\u9910', '\u5348\u9910', '\u4e0b\u5348\u8336', '\u665a\u9910', '\u5bb5\u591c'];
    const map = new Map();
    rows.forEach(row => {
      const key = row.period || '\u672a\u5206\u65f6\u6bb5';
      const item = map.get(key) || { label: key, revenue: 0, orders: 0 };
      item.revenue += Number(row.revenue || 0);
      item.orders += Number(row.orders || 0);
      map.set(key, item);
    });
    const buckets = [...map.values()].sort((a, b) => {
      const ai = order.indexOf(a.label), bi = order.indexOf(b.label);
      return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
    });
    const maxValue = axisMaxByStep(Math.max(...buckets.map(item => item.revenue)), 200, 3);
    axis.innerHTML = [maxValue, maxValue * 2 / 3, maxValue / 3, 0].map(value => `<span>${formatAxis(value)}</span>`).join('');
    bars.innerHTML = buckets.map(item => `<div class="vbar" style="--h:${Math.max(item.revenue > 0 ? 2 : 0, item.revenue / maxValue * 78).toFixed(0)}px" data-v="${formatMoney(item.revenue)}" data-d="${escapeHtml(periodLabel(item.label))}"></div>`).join('');
  };
  const renderOwnership = () => {
    const rows = rowsForDate(selectedDate);
    const prevRows = rowsForDate(compareDate());
    const ownership = document.querySelector('.ownership');
    if (!rows.length) {
      ownership.innerHTML = '<div class="data-empty">\u6682\u65e0\u4e1a\u52a1\u5f52\u5c5e\u6570\u636e</div>';
      return;
    }
    const totalRevenue = sum(rows, 'revenue');
    const prevTotalRevenue = sum(prevRows, 'revenue');
    const buildStats = (sourceRows, biz, total) => {
      const groupRows = sourceRows.filter(row => row.biz === biz);
      const revenue = sum(groupRows, 'revenue');
      const orders = sum(groupRows, 'orders');
      return { biz, revenue, orders, ticket: orders ? revenue / orders : 0, pct: total ? revenue / total * 100 : 0 };
    };
    const withCompare = biz => {
      const cur = buildStats(rows, biz, totalRevenue);
      const prev = buildStats(prevRows, biz, prevTotalRevenue);
      cur.revenueGrowth = safePct(cur.revenue, prev.revenue);
      return cur;
    };
    const dine = withCompare('\u5802\u98df');
    const take = withCompare('\u5916\u9001');
    const dinePct = Math.max(0, Math.min(100, dine.pct));
    const icon = type => type === 'dine' ? '<img src="assets/business-dine-icon.png?v=20260710" alt="">' : '<img src="assets/business-delivery-icon.png?v=20260710" alt="">';
    const hero = (item, cls, colorVar, softVar, type) => `<div class="own-hero ${cls}" style="--c:var(${colorVar});--soft:${softVar}"><span class="own-icon">${icon(type)}</span><div><span class="own-label">${item.biz}</span><strong class="own-pct">${item.pct.toFixed(1)}%</strong></div></div>`;
    const income = item => `<div><span>${item.biz}\u6536\u5165</span><b>${formatMoney(item.revenue)}</b><small class="own-growth ${growthClass(item.revenueGrowth)}">${compareLabel()} ${formatDeltaPct(item.revenueGrowth)}</small></div>`;
    const statCard = (item, cls, colorVar) => `<div class="own-stat-card ${cls}" style="--c:var(${colorVar})"><div class="own-stat-title"><i></i><span>${item.biz}</span></div><div class="own-stat-grid"><div><span class="own-stat-label">\u8ba2\u5355</span><b class="own-stat-value">${formatInt(item.orders)}<small class="own-unit">\u5355</small></b></div><span class="own-sep"></span><div><span class="own-stat-label">\u5ba2\u5355\u4ef7</span><b class="own-stat-value">\u00a5 ${item.ticket.toFixed(1)}</b></div></div></div>`;
    ownership.innerHTML = `<div class="own-top">${hero(dine, 'dine', '--yellow2', '#fff4cd', 'dine')}${hero(take, 'take', '--blue', '#eaf3ff', 'take')}</div><div class="own-stack" style="--dine:${dinePct.toFixed(1)}%"><span></span><span></span></div><div class="own-income">${income(dine)}${income(take)}</div><div class="own-divider"></div><div class="own-detail-cards">${statCard(dine, 'dine', '--yellow2')}${statCard(take, 'take', '--blue')}</div>`;
  };
  const channelLabel = name => name === '\u95e8\u5e97\u5802\u98df' ? '\u5802\u98dfPOS' : name;
  const renderChannelDetail = () => {
    const rows = rowsForDate(selectedDate);
    const totalRevenue = sum(rows, 'revenue');
    const map = new Map();
    rows.forEach(row => {
      const key = `${row.biz}||${row.channel}`;
      const item = map.get(key) || { biz: row.biz, channel: row.channel, revenue: 0, orders: 0 };
      item.revenue += Number(row.revenue || 0);
      item.orders += Number(row.orders || 0);
      map.set(key, item);
    });
    const items = [...map.values()].sort((a, b) => b.revenue - a.revenue);
    const maxRevenue = Math.max(1, ...items.map(item => item.revenue));
    const rowHtml = items.map(item => {
      const isDine = item.biz === '\u5802\u98df';
      const colorVar = isDine ? '--yellow2' : '--blue';
      const tagBg = isDine ? '#fff4c6' : '#edf4ff';
      const tagColor = isDine ? '#9a7200' : '#2f75d6';
      const showBizTag = item.channel === '\u5c0f\u7a0b\u5e8f';
      const ticket = item.orders ? item.revenue / item.orders : 0;
      const share = totalRevenue ? item.revenue / totalRevenue * 100 : 0;
      const barWidth = Math.max(3, item.revenue / maxRevenue * 100);
      return `<div class="ch-row" style="--c:var(${colorVar});--tag-bg:${tagBg};--tag-c:${tagColor}"><span class="ch-name"><i></i><b>${escapeHtml(channelLabel(item.channel))}</b>${showBizTag ? `<em>${escapeHtml(item.biz)}</em>` : ''}</span><span class="ch-num"><b>${formatMoney(item.revenue)}</b><em class="ch-share"><i style="--w:${barWidth.toFixed(0)}%"></i><small>${share.toFixed(1)}%</small></em></span><span class="ch-order">${formatInt(item.orders)}\u5355</span><span class="ch-ticket">\u00a5 ${ticket.toFixed(1)}</span></div>`;
    }).join('');
    document.querySelector('.ch-body').innerHTML = rowHtml || '<div class="detail-empty">\u6682\u65e0\u6e20\u9053\u6570\u636e</div>';
  };
  const currentProductRows = () => productsForDate(selectedDate);
  const productScopeText = () => `${selectedDate} · ${selectedProductCategory || '\u5168\u90e8\u5206\u7c7b'}`;
  const closeProductDetail = () => { productDetailPage.hidden = true; };
  const openProductDetail = (title, html) => {
    productDetailTitle.textContent = title;
    productDetailSub.textContent = productScopeText();
    productDetailContent.innerHTML = html;
    productDetailPage.hidden = false;
  };
  const excludedProductTerms = ['\u670d\u52a1\u8d39', '\u73a9\u5177'];
  const filteredProductRows = rows => rows.filter(row => !excludedProductTerms.some(term => `${row.category}${row.name}`.includes(term)));
  const productSalesRows = rows => {
    const byProduct = new Map();
    filteredProductRows(rows).forEach(row => {
      const key = `${row.code}|${row.name}`;
      const current = byProduct.get(key) || { name: row.name, category: row.category, qty: 0, income: 0 };
      current.qty += Number(row.qty || 0);
      current.income += Number(row.income || 0);
      byProduct.set(key, current);
    });
    return [...byProduct.values()].map(item => ({ ...item, unitPrice: item.qty ? item.income / item.qty : 0 })).sort((a, b) => b.qty - a.qty);
  };
  const showAllProductSales = products => {
    const rows = products.map((item, index) => `<div class="detail-row detail-product"><span class="detail-name">${index + 1}. ${escapeHtml(item.name)}</span><b>${formatInt(item.qty)}</b><b>${formatMoney(item.income)}</b><b>\u00a5${item.unitPrice.toFixed(1)}</b></div>`).join('');
    openProductDetail('\u5168\u90e8\u4ea7\u54c1\u9500\u552e', rows ? `<div class="detail-row detail-product detail-head"><span>\u5355\u54c1</span><span>\u9500\u91cf</span><span>\u6536\u5165</span><span>\u5747\u4ef7</span></div>${rows}` : '<div class="detail-empty">\u6682\u65e0\u4ea7\u54c1\u9500\u552e\u6570\u636e</div>');
  };
  const bindTop10Info = () => {
    const top10Info = document.getElementById('top10Info');
    const top10Note = document.getElementById('top10Note');
    if (!top10Info || !top10Note) return;
    const toggleTop10Note = () => {
      const visible = top10Note.hidden;
      top10Note.hidden = !visible;
      top10Info.setAttribute('aria-expanded', String(visible));
    };
    top10Info.addEventListener('click', toggleTop10Note);
    top10Info.addEventListener('keydown', event => { if (event.key === 'Enter' || event.key === ' ') { event.preventDefault(); toggleTop10Note(); } });
  };
  const renderProducts = () => {
    const topCard = document.querySelector('.product-top-card');
    const productRows = currentProductRows();
    const availableCategories = [...new Set(filteredProductRows(productRows).map(row => row.category).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'zh-CN'));
    if (selectedProductCategory && !availableCategories.includes(selectedProductCategory)) selectedProductCategory = '';
    const scopedRows = selectedProductCategory ? productRows.filter(row => row.category === selectedProductCategory) : productRows;
    const allProducts = productSalesRows(scopedRows);
    const topProducts = allProducts.slice(0, 10);
    const maxProductQty = Math.max(1, ...topProducts.map(item => item.qty));
    const rankHtml = topProducts.map((item, index) => `<div class="rank"><span class="num ${index < 3 ? 'hot' : ''}">${index + 1}</span><div class="rank-main"><span class="rank-name" title="${escapeHtml(item.name)}">${escapeHtml(item.name)}</span><span class="rank-bar"><i style="--w:${Math.max(6, item.qty / maxProductQty * 100).toFixed(0)}%"></i></span></div><span class="cnt">${formatInt(item.qty)}\u4efd<small>\u00a5${item.unitPrice.toFixed(1)}/\u4efd</small></span></div>`).join('');
    const categoryOptions = [`<option value="">\u5168\u90e8\u5206\u7c7b</option>`, ...availableCategories.map(category => `<option value="${escapeHtml(category)}" ${category === selectedProductCategory ? 'selected' : ''}>${escapeHtml(category)}</option>`)].join('');
    if (topCard) topCard.innerHTML = `<div class="top-head"><div class="ct">\u4ea7\u54c1\u9500\u552eTOP10 <span class="info" id="top10Info" role="button" tabindex="0" aria-controls="top10Note" aria-expanded="false">?</span></div><div class="product-actions"><select class="category-filter" id="productCategoryFilter" aria-label="\u4ea7\u54c1\u5206\u7c7b\u7b5b\u9009">${categoryOptions}</select><button class="more link-btn" id="allProductSalesLink" type="button">\u66f4\u591a ›</button></div></div><div class="note-chip" id="top10Note" hidden>\u4e0d\u542b\u670d\u52a1\u8d39\u4ea7\u54c1\u3001\u73a9\u5177\uff1b\u5355\u4ef7=\u4ea7\u54c1\u6536\u5165/\u6570\u91cf</div><div class="rank-list">${rankHtml || '<div class="rank"><span class="num">-</span><span>\u6682\u65e0\u6570\u636e</span><span class="cnt">0\u4efd</span></div>'}</div>`;
    const categoryFilter = document.getElementById('productCategoryFilter');
    if (categoryFilter) categoryFilter.addEventListener('change', event => { selectedProductCategory = event.target.value; renderProducts(); });
    const allProductSalesLink = document.getElementById('allProductSalesLink');
    if (allProductSalesLink) allProductSalesLink.addEventListener('click', () => showAllProductSales(allProducts));
    bindTop10Info();
  };
  function renderDashboard() {
    updateCompareLabels();
    renderSelectedTime();
    renderMetrics();
    renderChart();
    renderWeek();
    renderOwnership();
    renderChannelDetail();
    renderProducts();
  }
  document.querySelectorAll('.tab').forEach(tab => tab.onclick = () => { const text = tab.textContent.trim(); if (text === '\u6708\u5ea6') window.location.href = 'monthly.html'; else if (text === '\u5e74\u5ea6') window.location.href = 'index.html'; else if (text === '\u81ea\u5b9a\u4e49') window.location.href = 'custom.html'; });
  document.querySelectorAll('.compare-option').forEach(btn => btn.onclick = () => {
    compareMode = btn.dataset.compare || 'yesterday';
    renderDashboard();
  });
  productDetailBack.addEventListener('click', closeProductDetail);
  document.addEventListener('click', event => { if (!(event.target instanceof Element) || !event.target.closest('.chart')) hideChartTip(); });
  document.addEventListener('scroll', hideChartTip, true);
  window.addEventListener('resize', hideChartTip);
  renderDashboard();
})();
</script>
</body>
</html>
